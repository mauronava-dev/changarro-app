<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Changarro - Add Custom Product</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Design System Implementation -->

      tailwind.config = {
        darkMode: "class",

          extend: {
            "colors": {
                    "error-container": "#93000a",
                    "surface-dim": "#131313",
                    "outline": "#919096",

                    "secondary-fixed-dim": "#c6c6c7",
                    "surface-container-low": "#1c1b1b",
                    "on-secondary-fixed": "#1a1c1c",
                    "on-surface": "#e5e2e1",
                    "on-primary-container": "#626374",
                    "secondary-container": "#454747",
                    "surface-tint": "#c5c5d8",
                    "on-tertiary": "#2d2f41",
                    "inverse-primary": "#5c5d6e",
                    "surface": "#131313",
                    "on-primary-fixed": "#191b29",
                    "primary-fixed": "#e1e1f5",
                    "tertiary": "#ffffff",
                    "surface-bright": "#393939",
                    "on-tertiary-container": "#626377",
                    "inverse-surface": "#e5e2e1",

                    "primary": "#ffffff",
                    "on-tertiary-fixed": "#181a2c",
                    "surface-container-highest": "#353535",
                    "tertiary-container": "#e1e0f9",
                    "background": "#131313",
                    "secondary": "#c6c6c7",
                    "on-secondary-fixed-variant": "#454747",

                    "outline-variant": "#46464c",
                    "surface-container-high": "#2a2a2a",
                    "on-surface-variant": "#c7c5cc",
                    "on-primary": "#2e2f3e",
                    "surface-container": "#20201f",
                    "on-tertiary-fixed-variant": "#444559",
                    "tertiary-fixed": "#e1e0f9",
                    "secondary-fixed": "#e2e2e2",
                    "tertiary-fixed-dim": "#c4c5dc",
                    "surface-variant": "#353535",
                    "inverse-on-surface": "#313030",
                    "on-background": "#e5e2e1",
                    "on-error": "#690005",
                    "primary-fixed-dim": "#c5c5d8",
                    "primary-container": "#e1e1f5",
                    "on-error-container": "#ffdad6",
                    "on-secondary-container": "#b4b5b5"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "24px",
                    "container-margin": "32px",
                    "stack-sm": "12px",
                    "stack-md": "24px",
                    "stack-lg": "48px",
                    "unit": "8px"
            },
            "fontFamily": {
                    "body-lg": ["Atkinson Hyperlegible Next"],
                    "headline-lg-mobile": ["Plus Jakarta Sans"],
                    "body-md": ["Atkinson Hyperlegible Next"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "body-lg": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "label-md": ["16px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["40px", {"lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #131313;
            color: #e5e2e1;
            overflow-x: hidden;
            font-family: 'Atkinson Hyperlegible Next', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .form-card {
            background: #20201f;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .soft-shadow {
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface-container/80 backdrop-blur-lg border-b border-outline-variant">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="Changarro Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3g25IqyPxppePk_MoyIzCMyxdEGvAhWHmiR1D3Zlx9403Qw4WvZI5MnpljmIGPNvBmYF2J5E5ac1MpDaw2Y7BNHSojcspc_0KlbhdBHpMjzSQb34bmlMHdjDKaRY4wjCA-xqHp6xlUPASUe4c21LTcFvK23fdraw9GoIGRyR0kxkbQFn9rhEwi_uQs5v6uI3waMDxig-DXpHUkMQketC2cr8E7Vu57-c3zj4yyfbWvvECkRviDNnFyV1VblUms9kU5gAko3brdVbZ"/>
</div>
<span class="font-headline-md text-headline-md font-bold text-primary-fixed-dim">Changarro</span>
</div>
<div class="flex items-center gap-4">
<div class="text-label-md font-label-md text-primary-fixed-dim bg-surface-container-high px-4 py-1.5 rounded-full border border-outline-variant">
                $0.00
            </div>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-95">account_circle</button>
</div>
</header>
<!-- Main Content -->
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen">
<section class="mb-stack-lg">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-background mb-stack-sm">
                Venta Rápida
            </h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">
                Agrega un producto o servicio personalizado a la venta actual.
            </p>
</section>
<!-- Form Card -->
<div class="form-card p-stack-lg rounded-lg soft-shadow">
<form class="space-y-stack-lg" id="quick-sale-form">
<!-- Product Name -->
<div class="space-y-3">
<label class="text-label-md font-label-md text-on-surface-variant block uppercase tracking-widest px-1">
                        Nombre del Producto
                    </label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-full px-6 py-4 text-body-lg font-body-lg text-on-surface focus:ring-2 focus:ring-primary-fixed-dim focus:border-transparent outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="e.g. Servicio Especial" required="" type="text"/>
</div>
<!-- Price Input -->
<div class="space-y-3">
<label class="text-label-md font-label-md text-on-surface-variant block uppercase tracking-widest px-1">
                        Precio (MXN)
                    </label>
<div class="relative">
<span class="absolute left-6 top-1/2 -translate-y-1/2 text-primary-fixed-dim font-headline-md">$</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-full pl-12 pr-6 py-6 text-headline-lg font-headline-lg text-primary-fixed-dim focus:ring-2 focus:ring-primary-fixed-dim focus:border-transparent outline-none transition-all placeholder:text-primary-fixed-dim/20" placeholder="0.00" required="" step="0.01" type="number"/>
</div>
</div>
<!-- Category Chips -->
<div class="space-y-4">
<label class="text-label-md font-label-md text-on-surface-variant block uppercase tracking-widest px-1">
                        Categoría
                    </label>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-2.5 bg-primary-container text-on-primary-container font-label-md rounded-full transition-all border border-primary-container shadow-sm active:scale-95" type="button">SERVICIO</button>
<button class="px-6 py-2.5 border border-outline-variant text-on-surface-variant font-label-md rounded-full hover:bg-surface-variant hover:border-on-surface-variant transition-all active:scale-95" type="button">PRODUCTO</button>
<button class="px-6 py-2.5 border border-outline-variant text-on-surface-variant font-label-md rounded-full hover:bg-surface-variant hover:border-on-surface-variant transition-all active:scale-95" type="button">OTRO</button>
</div>
</div>
<!-- Primary Action Button -->
<div class="pt-6">
<button class="w-full py-5 bg-primary-container text-on-primary-container font-headline-md text-headline-md rounded-full shadow-lg hover:shadow-primary-container/20 hover:scale-[1.02] active:scale-95 transition-all duration-200 flex items-center justify-center gap-3" type="submit">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
                        Agregar al Carrito
                    </button>
</div>
</form>
</div>
<!-- Note Section -->
<div class="mt-stack-lg border-l-4 border-primary-fixed-dim/40 pl-6 py-2">
<p class="text-body-md font-body-md text-on-surface-variant leading-relaxed">
                * Esta acción registrará el item como una entrada manual en el reporte de hoy.
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface-container-lowest/90 backdrop-blur-xl border-t border-outline-variant shadow-[0_-4px_10px_rgba(0,0,0,0.3)]">
<!-- Sales Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant rounded-full transition-all active:scale-90" href="#">
<span class="material-symbols-outlined mb-1">point_of_sale</span>
<span class="text-[12px] font-label-md">Ventas</span>
</a>
<!-- Active Tab: New Sale (Represented as Add custom here) -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-2 active:scale-90 transition-all duration-150" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="text-[12px] font-bold font-label-md">Nueva</span>
</a>
<!-- Cart Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant rounded-full transition-all active:scale-90" href="#">
<span class="material-symbols-outlined mb-1">shopping_cart</span>
<span class="text-[12px] font-label-md">Carrito</span>
</a>
<!-- Settings Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-variant rounded-full transition-all active:scale-90" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="text-[12px] font-label-md">Ajustes</span>
</a>
</nav>
<!-- Micro-interactions Script -->
<script>
        document.getElementById('quick-sale-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> AGREGANDO...';
            btn.classList.add('opacity-80', 'scale-95');
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> ¡LISTO!';
                btn.classList.remove('bg-primary-container', 'text-on-primary-container', 'scale-95');
                btn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.add('bg-primary-container', 'text-on-primary-container');
                    btn.classList.remove('bg-tertiary-container', 'text-on-tertiary-container', 'opacity-80');
                }, 2000);
            }, 800);
        });

        const categoryBtns = document.querySelectorAll('button[type="button"]');
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary-container', 'shadow-sm');
                    b.classList.add('border-outline-variant', 'text-on-surface-variant');
                });
                btn.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary-container', 'shadow-sm');
                btn.classList.remove('border-outline-variant', 'text-on-surface-variant');
            });
        });
    </script>
</body></html>
